<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyo Ink Brasil | Captação de Leads</title>
    <!-- Fontes Modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Cores Artience / Toyo Ink */
            --dark-green: #00382B;     
            --dark-green-grad: #001A14;
            --accent-mint: #15A98B;    
            --accent-hover: #0F876E;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --input-bg: #F1F5F9;
            --success-color: #10B981;
            --error-color: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* Fundo Verde Superior */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--dark-green-grad) 100%);
            z-index: -1;
            overflow: hidden;
        }

        /* Header / Logo */
        header {
            background-color: var(--white);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            border-bottom: 4px solid var(--accent-mint);
        }

        .logo img {
            max-height: 85px; 
            width: auto;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        /* Container Principal */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 15px;
            z-index: 5;
        }

        .form-container {
            background-color: var(--white);
            max-width: 800px; /* Aumentado para acomodar 2 colunas */
            width: 100%;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -10px rgba(0, 56, 43, 0.2);
            position: relative;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-mint), var(--dark-green));
            border-radius: 20px 20px 0 0;
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* --- Sistema de Grid para o Formulário --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 colunas */
            gap: 20px 24px; /* Espaço entre as linhas e colunas */
        }

        .full-width {
            grid-column: 1 / -1; /* Ocupa as duas colunas */
        }

        /* Separadores Visuais */
        .section-title {
            grid-column: 1 / -1;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-green);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* Inputs e Labels */
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--dark-green);
        }

        .input-group label span {
            color: var(--error-color);
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="tel"],
        .input-group input[type="date"],
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 2px solid transparent; 
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Roboto', sans-serif;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            background-color: var(--white);
            border-color: var(--accent-mint);
            box-shadow: 0 0 0 4px rgba(21, 169, 139, 0.15);
        }

        /* Multi-Checkbox Premium (Estilo Tags/Pills) */
        .pills-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .pill-checkbox input[type="checkbox"] {
            display: none; 
        }

        .pill-checkbox label {
            display: inline-block;
            padding: 10px 16px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 50px;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .pill-checkbox label:hover {
            background-color: #E2E8F0;
            color: var(--dark-green);
        }

        .pill-checkbox input[type="checkbox"]:checked + label {
            background-color: var(--dark-green);
            color: var(--white);
            border-color: var(--dark-green);
            box-shadow: 0 4px 10px rgba(0, 56, 43, 0.2);
            transform: translateY(-1px);
        }

        /* Botão de Enviar */
        button[type="submit"] {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--accent-mint) 0%, #129379 100%);
            color: var(--white);
            border: none;
            padding: 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(21, 169, 139, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(21, 169, 139, 0.4);
            background: linear-gradient(135deg, #16b897 0%, #108069 100%);
        }

        button[type="submit"]:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loader & Mensagens */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .message-box {
            display: none;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
        }

        .message-box.success {
            background-color: #ECFDF5;
            color: var(--success-color);
            border: 1px solid #A7F3D0;
        }

        .message-box.error {
            background-color: #FEF2F2;
            color: var(--error-color);
            border: 1px solid #FECACA;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: auto;
            position: relative;
            z-index: 5;
        }

        footer a {
            color: var(--accent-mint);
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsividade para Celulares */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr; /* Volta para 1 coluna no celular */
                gap: 15px;
            }
            .form-container {
                padding: 30px 20px;
            }
            .logo img { max-height: 70px; }
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>

    <header>
        <a href="#" class="logo">
            <img src="img/toyo-ink-brasil.png" alt="Toyo Ink / Artience Logo">
        </a>
    </header>

    <main>
        <div class="form-container">
            <div class="form-header">
                <h1>Ficha de Visita</h1>
                <p>Registo comercial e acompanhamento de clientes.</p>
            </div>

            <div id="statusMessage" class="message-box"></div>

            <form id="leadForm" class="form-grid">
                
                <!-- Cabeçalho do Formulário Original -->
                <div class="input-group">
                    <label for="cliente">Cliente <span>*</span></label>
                    <input type="text" id="cliente" name="cliente" required placeholder="Nome do Cliente Principal">
                </div>

                <div class="input-group">
                    <label for="data_visita">Data da Visita <span>*</span></label>
                    <!-- Campo de data preenche automaticamente o dia de hoje via JS -->
                    <input type="date" id="data_visita" name="data_visita" required>
                </div>

                <div class="input-group full-width">
                    <label for="vendedor">Vendedor <span>*</span></label>
                    <input type="text" id="vendedor" name="vendedor" required placeholder="Nome do Vendedor">
                </div>

                <!-- Sessão: Dados do Cliente -->
                <h3 class="section-title">Dados do Cliente</h3>

                <div class="input-group">
                    <label for="empresa">Empresa</label>
                    <input type="text" id="empresa" name="empresa" placeholder="Razão Social / Nome Fantasia">
                </div>

                <div class="input-group">
                    <label for="pais_cidade">País/Cidade</label>
                    <input type="text" id="pais_cidade" name="pais_cidade" placeholder="Ex: Brasil / São Paulo">
                </div>

                <div class="input-group">
                    <label for="contato">Contato (Nome)</label>
                    <input type="text" id="contato" name="contato" placeholder="Nome do contato na empresa">
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" maxlength="15">
                </div>

                <div class="input-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" name="cargo" placeholder="Função do contato">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="email@empresa.com.br">
                </div>

                <!-- Sessão: Relatórios -->
                <h3 class="section-title">Anotações da Visita</h3>

                <div class="input-group full-width">
                    <label for="relatorio">Relatório da visita</label>
                    <textarea id="relatorio" name="relatorio" placeholder="Escreva aqui os principais pontos discutidos durante a visita..."></textarea>
                </div>

                <div class="input-group full-width">
                    <label for="followup">Follow-up / Próximas ações</label>
                    <textarea id="followup" name="followup" placeholder="Quais os próximos passos? (Ex: Enviar orçamento, ligar na terça-feira...)"></textarea>
                </div>

                <!-- Sessão: Segmento de Mercado e Tecnologia -->
                <h3 class="section-title">Segmento de Mercado e Tecnologia</h3>
                
                <div class="input-group full-width">
                    <div class="pills-group">
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_embalagem" name="segmento" value="Embalagem Offset">
                            <label for="seg_embalagem">Embalagem Offset</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_comercial" name="segmento" value="Comercial">
                            <label for="seg_comercial">Comercial</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_editorial" name="segmento" value="Editorial">
                            <label for="seg_editorial">Editorial</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_rotogravura" name="segmento" value="Rotogravura">
                            <label for="seg_rotogravura">Rotogravura</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_flexografia" name="segmento" value="Flexografia">
                            <label for="seg_flexografia">Flexografia</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="seg_digital" name="segmento" value="Digital Inkjet">
                            <label for="seg_digital">Digital Inkjet</label>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn">
                    <span id="btnText">Salvar Ficha de Visita</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>Toyo Ink Brasil - Inovação, qualidade e sustentabilidade.</p>
        <p style="margin-top: 5px;">
            Acesse nosso <a href="https://www.artience-toyoinkbrasil.com.br/home" target="_blank">Site Oficial</a>
        </p>
        <p style="margin-top: 15px;">&copy; <span id="year"></span> Grupo Artience. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Preencher a data automaticamente com o dia de hoje
        document.getElementById('data_visita').valueAsDate = new Date();
        document.getElementById('year').textContent = new Date().getFullYear();

        // Máscara de Telefone (WhatsApp)
        const telefoneInput = document.getElementById('telefone');
        telefoneInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            if (value.length > 0) formattedValue = '(' + value.substring(0, 2);
            if (value.length > 2) formattedValue += ') ' + value.substring(2, 7);
            if (value.length > 7) formattedValue += '-' + value.substring(7, 11);
            e.target.value = formattedValue;
        });

        // Lógica de Envio do Formulário (Integração Google Sheets)
        const form = document.getElementById('leadForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const statusMessage = document.getElementById('statusMessage');

        // URL DE PRODUÇÃO CONECTADA À SUA PLANILHA DA TOYO INK
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwj9_-e3lOm51Xr78skTiuXg7-OZ4u28IabySIip1ZWbeqai6rq-SSRRYWaFyNb9X71wg/exec';

        function showMessage(text, isError = false) {
            statusMessage.textContent = text;
            statusMessage.className = 'message-box ' + (isError ? 'error' : 'success');
            statusMessage.style.display = 'block';
            statusMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();

            submitBtn.disabled = true;
            btnText.textContent = 'A salvar ficha...';
            btnLoader.style.display = 'block';
            statusMessage.style.display = 'none';

            const formData = new FormData(form);
            
            // Juntar os segmentos selecionados
            const selectedSegments = Array.from(form.querySelectorAll('input[name="segmento"]:checked'))
                .map(cb => cb.value)
                .join(', ');
            formData.set('segmento', selectedSegments);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(response => {
                    showMessage('Sucesso! A ficha de visita foi guardada na planilha.');
                    form.reset();
                    document.getElementById('data_visita').valueAsDate = new Date(); // Mantém a data no dia de hoje após o reset
                    document.querySelectorAll('input[name="segmento"]').forEach(cb => cb.checked = false);
                    setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
                })
                .catch(error => {
                    console.error('Erro!', error.message);
                    showMessage('Houve um problema ao salvar. Verifique a internet e tente novamente.', true);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Salvar Ficha de Visita';
                    btnLoader.style.display = 'none';
                });
        });
    </script>
</body>
</html>
