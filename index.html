<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyo Ink Brasil | Captação de Leads</title>
    <!-- Fontes Modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Novas Cores Artience / Toyo Ink */
            --dark-green: #00382B;     
            --dark-green-grad: #001A14; /* Escureci um pouco mais para dar mais contraste */
            --accent-mint: #15A98B;    
            --accent-hover: #0F876E;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --input-bg: #F1F5F9;
            --success-color: #10B981;
            --error-color: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* Fundo Verde Superior (Efeito Flutuante) */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh; /* Aumentei a área verde */
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--dark-green-grad) 100%);
            z-index: -1;
            overflow: hidden;
        }

        /* Efeitos visuais luxuosos no fundo */
        .hero-background::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(21, 169, 139, 0.08) 0%, transparent 60%);
            top: -50%;
            left: -25%;
            animation: pulse 15s infinite alternate;
        }

        .hero-background::after {
            content: '';
            position: absolute;
            right: -5%;
            top: -10%;
            width: 60vh;
            height: 60vh;
            background: radial-gradient(circle, rgba(21, 169, 139, 0.12) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Header / Logo */
        header {
            background-color: var(--white);
            padding: 25px 0; /* Mais respiro */
            text-align: center;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            border-bottom: 4px solid var(--accent-mint); /* Linha de destaque */
        }

        .logo img {
            max-height: 110px; /* LOGO BEM MAIOR AQUI! */
            width: auto;
            object-fit: contain;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        /* Container Principal */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px 20px;
            z-index: 5;
        }

        .form-container {
            background-color: var(--white);
            max-width: 680px; /* Um pouco mais largo */
            width: 100%;
            padding: 55px;
            border-radius: 24px; /* Mais arredondado = mais amigável e premium */
            box-shadow: 0 25px 50px -12px rgba(0, 56, 43, 0.25); /* Sombra mais profunda e colorida */
            position: relative;
        }

        /* Linha gradiente no topo do card */
        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--accent-mint), var(--dark-green));
            border-radius: 24px 24px 0 0;
        }

        .form-header {
            text-align: center;
            margin-bottom: 45px;
        }

        .form-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px; /* Título Maior e mais impactante */
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 12px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
        }

        /* Inputs e Labels */
        .input-group {
            margin-bottom: 28px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--dark-green);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-group label span {
            color: var(--error-color);
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="tel"],
        .input-group select {
            width: 100%;
            padding: 16px 20px;
            background-color: var(--input-bg);
            border: 2px solid transparent; 
            border-radius: 12px; /* Campos mais arredondados */
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Roboto', sans-serif;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-group input:focus,
        .input-group select:focus {
            background-color: var(--white);
            border-color: var(--accent-mint);
            box-shadow: 0 0 0 4px rgba(21, 169, 139, 0.15);
        }

        .input-group input::placeholder {
            color: #94A3B8;
        }

        /* Multi-Checkbox Premium (Estilo Tags/Pills) */
        .pills-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .pill-checkbox {
            position: relative;
        }

        .pill-checkbox input[type="checkbox"] {
            display: none; 
        }

        .pill-checkbox label {
            display: inline-block;
            padding: 12px 20px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 50px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .pill-checkbox label:hover {
            background-color: #E2E8F0;
            color: var(--dark-green);
        }

        /* Estado Selecionado da Tag */
        .pill-checkbox input[type="checkbox"]:checked + label {
            background-color: var(--dark-green);
            color: var(--white);
            border-color: var(--dark-green);
            box-shadow: 0 6px 15px rgba(0, 56, 43, 0.3);
            transform: translateY(-2px);
        }

        /* Botão de Enviar */
        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-mint) 0%, #129379 100%);
            color: var(--white);
            border: none;
            padding: 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(21, 169, 139, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(21, 169, 139, 0.5);
            background: linear-gradient(135deg, #16b897 0%, #108069 100%);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px rgba(21, 169, 139, 0.4);
        }

        button[type="submit"]:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loader do Botão */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mensagens de Sucesso/Erro */
        .message-box {
            display: none;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 15px;
            animation: fadeIn 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-box.success {
            background-color: #ECFDF5;
            color: var(--success-color);
            border: 1px solid #A7F3D0;
        }

        .message-box.error {
            background-color: #FEF2F2;
            color: var(--error-color);
            border: 1px solid #FECACA;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: auto;
            position: relative;
            z-index: 5;
        }

        footer a {
            color: var(--accent-mint);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--dark-green);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .hero-background {
                height: 40vh;
            }
            .form-container {
                padding: 40px 25px;
                border-radius: 20px;
            }
            .form-header h1 {
                font-size: 26px;
            }
            .logo img {
                max-height: 85px; /* Ajuste proporcional no telemóvel/celular */
            }
        }
    </style>
</head>
<body>

    <!-- Fundo verde escuro estilizado -->
    <div class="hero-background"></div>

    <header>
        <a href="#" class="logo">
            <!-- Logo oficial atualizado -->
            <img src="https://scontent.fcgh15-1.fna.fbcdn.net/v/t39.30808-6/488143226_1316475856937166_8906887639841739232_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeEBcMzWq60nCApPqNEL2osKy_36Cvefy2TL_foK95_LZDW6EwqecL3CWnBW4zI2AkX8woQRUWCGzbr1a4cxOKEU&_nc_ohc=sLMcd_AEWhYQ7kNvwHxXKZ2&_nc_oc=AdnAo1080tzk_CaDUyf3GQpSFd7LlnsYvcqHybZyRkWVn0JHWWh4SUi8TkabA8s0NJwhBPPJMLwP9Ik7543LLEpa&_nc_zt=23&_nc_ht=scontent.fcgh15-1.fna&_nc_gid=MLAk3kg7hRy7mzogsztlEw&oh=00_AfvqBwBs5xortIzagTfDhr23XFxGVtBxX-KR7gVerLP50A&oe=69A296E8" alt="Toyo Ink / Artience Logo">
        </a>
    </header>

    <main>
        <div class="form-container">
            <div class="form-header">
                <h1>Captação de Contatos</h1>
                <p>Registe as informações do cliente para enviarmos novidades e soluções da Artience / Toyo Ink.</p>
            </div>

            <div id="statusMessage" class="message-box"></div>

            <form id="leadForm">
                <div class="input-group">
                    <label for="nome">Nome do Cliente <span>*</span></label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: João da Silva">
                </div>

                <div class="input-group">
                    <label for="empresa">Empresa <span>*</span></label>
                    <input type="text" id="empresa" name="empresa" required placeholder="Nome da empresa">
                </div>

                <div class="input-group">
                    <label for="email">E-mail Corporativo <span>*</span></label>
                    <input type="email" id="email" name="email" required placeholder="joao@empresa.com.br">
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone / WhatsApp <span>*</span></label>
                    <input type="tel" id="telefone" name="telefone" required placeholder="(11) 99999-9999" maxlength="15">
                </div>

                <div class="input-group">
                    <label>Área de Interesse Principal <span>(Selecione uma ou mais)</span></label>
                    <!-- Checkboxes transformados em Tags (Pills) modernas -->
                    <div class="pills-group">
                        <div class="pill-checkbox">
                            <input type="checkbox" id="area1" name="area_interesse" value="Impressão Offset">
                            <label for="area1">Impressão Offset</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="area2" name="area_interesse" value="Embalagens Flexíveis">
                            <label for="area2">Embalagens Flexíveis</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="area3" name="area_interesse" value="Rótulos e Etiquetas">
                            <label for="area3">Rótulos e Etiquetas</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="area4" name="area_interesse" value="Impressão Digital">
                            <label for="area4">Impressão Digital</label>
                        </div>
                        <div class="pill-checkbox">
                            <input type="checkbox" id="area5" name="area_interesse" value="Outros">
                            <label for="area5">Outros</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="como_conheceu">Como o cliente nos conheceu?</label>
                    <select id="como_conheceu" name="como_conheceu">
                        <option value="">Selecione uma opção...</option>
                        <option value="Feira de Exposição">Feira de Exposição / Evento</option>
                        <option value="Indicação">Indicação</option>
                        <option value="Redes Sociais">Redes Sociais</option>
                        <option value="Site">Site Oficial</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn">
                    <span id="btnText">Salvar Contato</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>Toyo Ink Brasil - Inovação, qualidade e sustentabilidade.</p>
        <p style="margin-top: 5px;">
            Acesse nosso <a href="https://www.artience-toyoinkbrasil.com.br/home" target="_blank">Site Oficial</a>
        </p>
        <p style="margin-top: 15px;">&copy; <span id="year"></span> Grupo Artience. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Atualizar o ano dinamicamente no rodapé
        document.getElementById('year').textContent = new Date().getFullYear();

        // Máscara de Telefone (WhatsApp)
        const telefoneInput = document.getElementById('telefone');
        
        telefoneInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            
            if (value.length > 0) {
                formattedValue = '(' + value.substring(0, 2);
            }
            if (value.length > 2) {
                formattedValue += ') ' + value.substring(2, 7);
            }
            if (value.length > 7) {
                formattedValue += '-' + value.substring(7, 11);
            }
            e.target.value = formattedValue;
        });

        // Lógica de Envio do Formulário (Integração Google Sheets)
        const form = document.getElementById('leadForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const statusMessage = document.getElementById('statusMessage');

        // IMPORTANTE: Substitua a URL abaixo pela URL gerada pelo seu Google Apps Script
        const SCRIPT_URL = 'COLOQUE_SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI';

        function showMessage(text, isError = false) {
            statusMessage.textContent = text;
            statusMessage.className = 'message-box ' + (isError ? 'error' : 'success');
            statusMessage.style.display = 'block';
            statusMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();

            // Validação de segurança para testes
            if(SCRIPT_URL === 'COLOQUE_SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI') {
                showMessage('Modo de Teste: O visual está maravilhoso e a lógica funciona! Para gravar dados reais, insira a URL do Google Apps Script no código.', true);
                return;
            }

            // Alterar estado do botão para "A carregar"
            submitBtn.disabled = true;
            btnText.textContent = 'A salvar...';
            btnLoader.style.display = 'block';
            statusMessage.style.display = 'none';

            const formData = new FormData(form);
            
            // Capturar as áreas de interesse selecionadas e transformar num único texto
            const selectedAreas = Array.from(form.querySelectorAll('input[name="area_interesse"]:checked'))
                .map(cb => cb.value)
                .join(', ');
            formData.set('area_interesse', selectedAreas);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(response => {
                    showMessage('Sucesso! O contato foi salvo na planilha.');
                    form.reset();
                    // Remover a seleção visual das tags (Pills)
                    document.querySelectorAll('input[name="area_interesse"]').forEach(cb => cb.checked = false);
                    setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
                })
                .catch(error => {
                    console.error('Erro!', error.message);
                    showMessage('Houve um problema ao salvar. Verifique a internet e tente novamente.', true);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Salvar Contato';
                    btnLoader.style.display = 'none';
                });
        });
    </script>
</body>
</html>
